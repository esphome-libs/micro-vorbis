name: Publish

on:
  release:
    types: [published]

jobs:
  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI passed on release commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check that all expected CI checks passed on this commit
          # Matrix jobs append parameters to the name (e.g. "PlatformIO Build (decode_benchmark)"),
          # so we match by prefix rather than exact name.
          EXPECTED_CHECKS=("Pre-commit checks" "Static analysis" "Build" "Test" "Fuzz build" "PlatformIO Build")
          CONCLUSIONS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
            --paginate --jq '.check_runs[] | .name + "=" + .conclusion')

          for check in "${EXPECTED_CHECKS[@]}"; do
            matches=$(echo "$CONCLUSIONS" | grep "^${check}" || true)
            if [ -z "$matches" ]; then
              echo "Required CI check not found: $check"
              exit 1
            fi
            all_passed=true
            while IFS= read -r match; do
              name="${match%=*}"
              conclusion="${match##*=}"
              if [ "$conclusion" != "success" ]; then
                echo "CI check '$name' did not pass: $conclusion"
                all_passed=false
              else
                echo "CI check '$name' passed"
              fi
            done <<< "$matches"
            if [ "$all_passed" != "true" ]; then
              exit 1
            fi
          done

  publish-platformio:
    name: Publish to PlatformIO
    needs: [ci-gate]
    runs-on: ubuntu-latest
    environment: platformio
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/micro-ogg-demuxer
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      - name: Install platformio
        run: pip install --upgrade platformio
      - name: Publish package
        env:
          PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
        run: pio package publish --owner esphome --non-interactive

  publish-espressif:
    name: Publish to Espressif
    needs: [ci-gate]
    runs-on: ubuntu-latest
    environment: espressif
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/micro-ogg-demuxer
      - name: Publish package
        uses: espressif/upload-components-ci-action@2ce17d73e35473317c1419dbd4f007aacb593040 # v2.2.1
        with:
          version: ${{ github.event.release.tag_name }}
          components: |
            micro-vorbis: .
          namespace: esphome
