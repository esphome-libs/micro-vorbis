name: Publish

on:
  release:
    types: [published]

# Least privilege: jobs only read the repo to check out and publish. Jobs that need more should
# add a narrower job-level permissions block rather than widening this default.
permissions:
  contents: read

jobs:
  verify-version:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check library.json and idf_component.yml against the release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          expected="${TAG#v}"
          lib="$(jq -r '.version' library.json)"
          idf="$(grep -m1 '^version:' idf_component.yml | sed -e 's/^version:[[:space:]]*//' -e 's/"//g' -e 's/[[:space:]]*$//')"
          echo "tag=$TAG expected=$expected library.json=$lib idf_component.yml=$idf"
          fail=0
          [ "$lib" = "$expected" ] || { echo "::error::library.json version ($lib) != release tag ($expected)"; fail=1; }
          [ "$idf" = "$expected" ] || { echo "::error::idf_component.yml version ($idf) != release tag ($expected)"; fail=1; }
          exit $fail

  ci-gate:
    name: CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: read
    steps:
      - name: Verify CI passed on the release commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Block the release unless the aggregate "CI success" check passed on this commit. That job
          # (ci-success in ci.yml) needs every other job and fails if any failed or was cancelled,
          # with skipped jobs treated as passing, so gating on it alone covers the whole suite and
          # tracks future job changes. The release tag name is the check-runs ref so the API resolves
          # it to the underlying commit (github.sha can be an annotated tag's object SHA, which carries
          # no check runs). Take the most recently completed "CI success" run in case the commit was
          # built more than once.
          conclusion="$(gh api "repos/${{ github.repository }}/commits/${{ github.event.release.tag_name }}/check-runs" \
            --paginate --jq '.check_runs[] | select(.name == "CI success" and .status == "completed") | "\(.completed_at) \(.conclusion)"' \
            | sort | tail -1 | awk '{print $NF}')"
          echo "Latest completed 'CI success' conclusion: ${conclusion:-<none found>}"
          if [ "$conclusion" != "success" ]; then
            echo "::error::CI success did not pass on the release commit (got '${conclusion:-not found}'). Refusing to publish."
            exit 1
          fi
          echo "CI success passed on the release commit; proceeding to publish."

  publish-platformio:
    name: Publish to PlatformIO
    needs: [verify-version, ci-gate]
    runs-on: ubuntu-latest
    environment: platformio
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/micro-ogg-demuxer
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      - name: Install platformio
        run: pip install --upgrade platformio
      - name: Publish package
        env:
          PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
        run: pio package publish --owner esphome --non-interactive

  publish-espressif:
    name: Publish to Espressif
    needs: [verify-version, ci-gate]
    runs-on: ubuntu-latest
    environment: espressif
    permissions:
      # Job-level permissions replace the workflow default, so re-grant the read checkout needs.
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false
      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/micro-ogg-demuxer
      - name: Publish package
        uses: espressif/upload-components-ci-action@2ce17d73e35473317c1419dbd4f007aacb593040 # v2.2.1
        with:
          version: ${{ github.event.release.tag_name }}
          components: |
            micro-vorbis: .
          namespace: esphome
