---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual "Run workflow" from the Actions tab.
  workflow_dispatch:

# Least privilege: every job here only reads the repo (checkout, build, test, cache). Jobs that
# need more should add a narrower job-level permissions block rather than widening this default.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # New commits supersede an in-progress run on the same ref instead of running both to completion.
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - uses: esphome/pre-commit-action@43cd1109c09c544d97196f7730ee5b2e0cc6d81e # v3.0.1 fork with pinned actions/cache

  lint:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/micro-ogg-demuxer

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18

      - name: Run clang-tidy
        run: ./script/clang-tidy.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/micro-ogg-demuxer

      - name: Configure CMake
        run: cmake -B build -DENABLE_SANITIZERS=ON -DENABLE_WERROR=ON host_examples/vorbis_to_wav

      - name: Build
        run: cmake --build build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/micro-ogg-demuxer

      - name: Configure unit tests with sanitizers
        run: cmake -B tests/build -DENABLE_SANITIZERS=ON -DENABLE_WERROR=ON tests

      - name: Build unit tests
        run: cmake --build tests/build

      - name: Run unit tests
        run: ctest --test-dir tests/build --output-on-failure

  fuzz:
    name: Fuzz build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/micro-ogg-demuxer

      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      # Standalone harness (no libFuzzer runtime needed) under ASan/UBSan.
      # Guards against harness compile/link regressions and gives the tree a
      # clang build; deep corpus fuzzing stays a local task (see tests/fuzz).
      - name: Configure fuzz harness (standalone)
        run: cmake -B tests/fuzz/build -DFUZZ_USE_LIBFUZZER=OFF -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ tests/fuzz

      - name: Build fuzz harness
        run: cmake --build tests/fuzz/build

      - name: Run standalone torture battery
        env:
          FUZZ_ITERATIONS: '500'
          ASAN_OPTIONS: abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ./tests/fuzz/build/fuzz_ogg_vorbis_decode

  platformio:
    name: PlatformIO Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        example: [decode_benchmark]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Initialize library submodules
        run: git submodule update --init --depth 1 lib/micro-ogg-demuxer

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.platformio
            examples/${{ matrix.example }}/.pio
          key: pio-${{ matrix.example }}-${{ hashFiles(format('examples/{0}/platformio.ini', matrix.example)) }}
          restore-keys: |
            pio-${{ matrix.example }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.example }}
        run: pio run -d examples/${{ matrix.example }}

  # Single aggregating status for branch protection: require only "CI success" instead of every job.
  # always() so it reports even when a job fails; skipped dependencies are treated as passing (only
  # failure/cancelled blocks). New jobs added above are covered once listed under needs.
  ci-success:
    name: CI success
    if: always()
    needs:
      - pre-commit
      - lint
      - build
      - test
      - fuzz
      - platformio
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more CI jobs failed or were cancelled:"
          echo '${{ toJSON(needs) }}'
          exit 1

      - name: Report success
        run: echo "All required CI jobs passed (skipped jobs are allowed)."
