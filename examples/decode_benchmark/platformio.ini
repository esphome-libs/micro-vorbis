[platformio]
; Source lives in main/ so the project also builds with native idf.py, which
; requires a component named main. This points PlatformIO at the same directory.
src_dir = main

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
framework = espidf
monitor_speed = 115200

[env:esp32]
; Use a WROVER-based board so PSRAM is wired up. Swap for your specific board
; (e.g. esp-wrover-kit, nodemcu-32s with PSRAM, etc.) if needed.
board = esp-wrover-kit
; Plain ESP32 cannot sustain more than one concurrent Vorbis stream, so cap the
; benchmark's task count at 1.
build_flags = -DDECODE_BENCH_MAX_CONCURRENT_TASKS=1

[env:esp32p4]
board = esp32-p4-evboard

[env:esp32s3]
board = esp32-s3-devkitm-1
upload_protocol = esp-builtin
